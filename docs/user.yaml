openapi: 3.0.0
info:
  title: Movie Booking System API
  version: 1.0.0
  description: Swagger documentation for User APIs

tags:
  - name: Users
    description: User management endpoints

paths:
  /users/signup:
    post:
      summary: Register a new user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - role
              properties:
                name:
                  type: string
                  example: Jayanto Choudhury
                email:
                  type: string
                  example: joycoolxx@gmail.com
                password:
                  type: string
                  example: abc1234567
                role:
                  type: string
                  enum: [user, admin, theaterAdmin]
                  example: user / admin
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully
        '400':
          description: Invalid input or missing fields
        '500':
          description: Server error

  /users/login:
    post:
      summary: Login a user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: joycoolxx@gmail.com
                password:
                  type: string
                  example: abc1234567
      responses:
        '200':
          description: Login successful, returns JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login Successful
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  userId:
                    type: string
                    example: 685d758905a259849ae0124a
                  role:
                    type: string
                    example: user
        '401':
          description: Invalid email or password
        '500':
          description: Server error

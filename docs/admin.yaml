paths:
  /admin/all-users:
    get:
      summary: Get a list of all users (Admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                    name:
                      type: string
                    email:
                      type: string
                    role:
                      type: string
        '401':
          description: Unauthorized - Missing or invalid token
        '403':
          description: Forbidden - Admins only

  /admin/add-movie:
    post:
      summary: Add a new movie (Admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - releaseDate
                - duration
                - genre
                - language
              properties:
                title:
                  type: string
                description:
                  type: string
                releaseDate:
                  type: string
                  format: date
                duration:
                  type: integer
                genre:
                  type: string
                language:
                  type: string
                hall:
                  type: string
      responses:
        '201':
          description: Movie created successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admins only

  /admin/all-bookings:
    get:
      summary: Get all bookings (Admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: showId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                    user:
                      type: string
                    movie:
                      type: string
                    hall:
                      type: string
                    show:
                      type: string
                    numberOfSeats:
                      type: integer
                    totalPrice:
                      type: number
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admins only
paths:
  /movies/create:
    post:
      summary: Add a new movie (Admin only)
      tags:
        - Movies
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
                - releaseDate
                - duration
                - genre
                - language
              properties:
                title:
                  type: string
                  example: Tarzon The Wonder Car
                description:
                  type: string
                  example: Mind bending thriller
                releaseDate:
                  type: string
                  format: date
                  example: 2010-06-29
                duration:
                  type: integer
                  example: 148
                genre:
                  type: string
                  example: Sci-Fi
                language:
                  type: string
                  example: Hindi
      responses:
        '201':
          description: Movie created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Movie added successfully
                  movie:
                    type: object
        '400':
          description: Invalid request data
        '403':
          description: Forbidden - Only admin can add
        '500':
          description: Server error

  /movies/all:
    get:
      summary: Get all movies
      tags:
        - Movies
      responses:
        '200':
          description: List of all movies
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: All movies fetched successfully
                  movies:
                    type: array
                    items:
                      type: object
        '500':
          description: Server error
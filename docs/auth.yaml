paths:
  /auth/protected:
    get:
      summary: Access a protected route (requires JWT token)
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Access granted to protected route
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Access granted
        '401':
          description: Unauthorized - Missing or invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Unauthorized

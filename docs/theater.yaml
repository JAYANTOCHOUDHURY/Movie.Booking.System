paths:
  /theaters/create:
    post:
      summary: Create a new theater (Admin only)
      tags:
        - Theaters
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - location
              properties:
                name:
                  type: string
                  example: PVR Cinemas
                location:
                  type: string
                  example: Dhanbad, Jharkhand
      responses:
        '201':
          description: Theater created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Theater created successfully
                  theater:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: 685d764605a259849ae0124c
                      name:
                        type: string
                        example: PVR Cinemas
                      location:
                        type: string
                        example: Dhanbad, Jharkhand
                      createdBy:
                        type: string
                        example: 685d700205a259849ae01247
        '401':
          description: Unauthorized or missing token
        '403':
          description: Forbidden - only admin can access
        '500':
          description: Server error